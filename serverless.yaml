service: my-awesome-app
‚Äã
package:
  individually: true
‚Äã
provider:
  name: aws
  runtime: python3.12
  region: ap-south-1
  stage: ${opt:stage, "dev"}
‚Äã
plugins:
  - serverless-python-requirements
‚Äã
custom:
  pythonRequirements:
    dockerizePip: true
    layer:
      name: my-awesome-app-layer
      description: My awesome app layer
      compatibleRuntimes:
        - python3.12
‚Äã
functions:
  app:
    package:
      include:
        - "main.py"
      exclude:
        - "requirements.txt"
        - "package.json"
        - "package-lock.json"
        - ".serverless/**"
        - ".virtualenv/**"
        - "node_modules/**"
‚Äã
    handler: main.handler
    environment:
      STAGE: ${self:provider.stage}
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
    events:
      - http:
          method: any
          path: /{proxy+}