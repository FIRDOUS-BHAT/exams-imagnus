<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, shrink-to-fit=9">

    <link href="/static/admin/css/style.css" rel="stylesheet">
    <link href="/static/admin/css/responsive.css" rel="stylesheet">

    <link href="/static/admin/vendor/OwlCarousel/assets/owl.carousel.css" rel="stylesheet">
    <link href="/static/admin/vendor/OwlCarousel/assets/owl.theme.default.min.css" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="/static/admin/vendor/semantic/semantic.min.css">
</head>

<body>
    {% for message in get_flashed_messages(request) %}
    <!-- <div class="{{ message.category }}">{{ message.message }}</div> -->
    
    
    <div class="alert alert-{{ message.category }} alert-dismissible fade show "
        role="alert">
        
<div style="text-align:center !important;">
            <!-- <b>{{ message.message }}</b> -->
            <b style="text-align:center;"> Unauthorized Access </b>
        </div>
        <!-- <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button> -->
    
    </div>
    
    
    {% endfor %}
    <div class="sign_in_up_bg">
        <div class="container">
           
            <div class="row justify-content-lg-center justify-content-md-center">
                <div class="col-lg-12">
                    <div class="logo" id="logo">
                        <a href=""><img src="/static/admin/images/logo.png" alt=""></a>
                        <a href=""><img class="logo-inverse" src="/static/admin/images/logo.png" alt=""></a>
                    </div>


                  


                </div>
               

                   
                <div class="col-lg-4 col-md-8">
                    <div class="sign_form" style="background: #ffe5e5;">
                        <h2>Welcome Back</h2>
                        <p>Log In to Your iMagnus Account!</p>

                        <form action="/secure/admin/login/" method="post">
                            <div class="ui search focus mt-10">
                                <div class="ui left icon input swdh95">
                                    <input class="prompt srch_explore" type="tel" name="username" value=""
                                        id="id_mobile" required="" maxlength="10" placeholder="+91 | Mobile Number">
                                    <i class="uil uil-cell icon icon2"></i>
                                </div>
                            </div>
                            <div class="ui search focus mt-15">
                                <div class="ui left icon input swdh95">
                                    <input class="prompt srch_explore" type="password" name="password" value=""
                                        id="id_password" required="" maxlength="64" placeholder="Password">
                                    <i class="uil uil-key-skeleton-alt icon icon2"></i>
                                </div>
                            </div>
                            <div class="ui form mt-20 checkbox_sign">
                                <div class="inline field">
                                    <div class="ui checkbox mncheck">
                                        <input type="checkbox" tabindex="0" class="hidden">
                                        <label>Remember Me</label>
                                    </div>
                                </div>
                            </div>
                            <button class="login-btn" type="submit">Sign In</button>
                        </form>

                    </div>
                    <div class="sign_footer"><img src="/static/admin/images/sign_logo.png" alt="">© 2021 <strong>iMagnus</strong>. All
                        Rights Reserved.</div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/admin/js/jquery-3.3.1.min.js"></script>
    <script src="/static/admin/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/static/admin/vendor/OwlCarousel/owl.carousel.js"></script>
    <script src="/static/admin/vendor/semantic/semantic.min.js"></script>
    <script src="/static/admin/js/custom.js"></script>
    <script src="/static/admin/js/night-mode.js"></script>
</body>
