<script>

$(document).on('click', '#submit_question', function(e){
  let chosen = $('[name="example1"]:checked').val()
   let callback = e.target.getAttribute('data-callback')
   let lang = "{{lang}}"

   //  $.post(callback, {"chosen":chosen},function(res){

   //       alert(res)
   //  })

   function runsnackbar(message){
  

      SnackBar({
            message: message,
            status: "success",
            position: "bl" // bl, tl, tr, br
         });

}

    $('#submit_question').prop('disabled', true);
    $.ajax({
                url: callback,
                type: "post", //Change this to post or put
                data: JSON.stringify({"chosen":chosen}),
                dataType: "json",
                contentType: "application/json",
                success: function(data) {
                  $('#submit_question').prop('disabled', false);
                  if(data.status){
                   $('#new_qsn_no').text(data.counter)
                   $('#new_qsn').text(data.qstn_content.qstn)
                   $('#opt_1_text').text(data.qstn_content.opt_1)
                   $('#opt_2_text').text(data.qstn_content.opt_2)
                   $('#opt_3_text').text(data.qstn_content.opt_3)
                   $('#opt_4_text').text(data.qstn_content.opt_4)
                  if(data.nx){
                     nx = data.nx
                  }else{
                     nx = null
                  }
                  $('#new_qsn_no').text(data.counter+1)  
                  callback = '/student/scholarship/testSeriesQstns/'+data.test_id+'/'+data.qstn_content.id+'/'+nx+'/'+data.lang+'/'+data.counter+'/'
                  $('#callback_url').val(callback)
                  $('#submit_question').attr('data-callback',callback)
                  $('input[name="example1"]').prop('checked', false);
                  $('#qstn_arr').html('')
                  let total_qstns = "{{ qstn_count }}"
                  for(i=0;i<total_qstns;i++){

                     if((i+1)<=data.counter){
                        $('#qstn_arr').append('<button class="steps_btn_success">'+ (i+parseInt(1)) +'</button>')
                     }else if((i+1)==(data.counter+1))
                     {
                        $('#qstn_arr').append('<button style="border:2px solid #333 !important" class="steps_btn">'+ (i+parseInt(1)) +'</button>')
                     }
                     else{

                     $('#qstn_arr').append('<button class="steps_btn">'+ (i+parseInt(1)) +'</button>')
                   
                  }
                  }
                 
                   }else{

                     SnackBar({
                        message: data.message,
                        fixed: true,
                        status: "error",
                        position: "tc" // bl, tl, tr, br
                     });
                    
                      //alert(data.message)
                   }
                },
            });


})

                  }

                      //alert(data.message)
                   }
 
         }
      })
   })



function startTimer(duration, display) {
        var timer = duration, minutes, seconds;
        var x = setInterval(function () {
        minutes = parseInt(timer / 60, 10);
        seconds = parseInt(timer % 60, 10);
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        display.textContent = minutes + ":" + seconds;

        if (--timer < 0) {
            //timer = duration;
            clearInterval(x);
            $('#myModal').modal('show')
        }
    }, 1000);
}

window.onload = function () {
    var y = "{{ time_duration }}" * 60,
    display = document.querySelector('#timer');
    startTimer(y, display);
};
