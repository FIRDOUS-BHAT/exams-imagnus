 {% extends "base.html" %}
         {% block content %}


 <div class="page_loader"></div>
                <div class="login-14">
		 
     <div class="container">
         <div class="row login-box">
             <div class="col-lg-12 col-md-12 bg-color-16 align-self-center">

                 <div class="form-section">
                     <h3>Select Preference </h3>
                     <div class="login-inner-form">
                             <div class="checkbox clearfix">
                                 {% for preference in preferences %}
                              <div class="card mb-20">
                                <div class="card-body hover">
                                 <div class="form-check checkbox-theme">
                                     <input class="form-check-input" type="checkbox" name="pref_id" value="{{ preference.slug }}" id="{{ preference.id }}" />
                                     <label class="form-check-label" for="{{ preference.id }}">
                                         {{ preference.name }}
                                     </label>
                                 </div>
                                 <br>
                                <small style="float: left;margin-top: 10px;">
                                    {% for course in preference.courses %}
                                    {% if loop.index < 5%}

                                    {{ course.name }}

                                    {% endif %}
                                        <!-- {% if not loop.last  %}
                                          {{ course.name }},
                                        {% else %}
                                           {{ course.name }}
                                        {% endif %} -->

                                    {% endfor %}

                                    etc..</small>
                                 
                                </div>
                              </div>
                              {% endfor %}

                              
                             </div>
                             <div class="form-group mb-20">
                                 <button type="button" id="pref_submit_btn" class="btn-md btn-theme btn-block">Submit
								 <i class="fa fa-arrow-circle-right float-right" aria-hidden="true" style="margin-top: 2px;"></i></button>
                             </div>
                            
                     </div>
                 </div>
             </div>
         </div>
     </div>
 </div>



 {% endblock %}
