{% extends "student_dashboard_base.html" %}
{% block content %}

<div class="sa4d25 dashboard-shell">
  <div class="container-fluid">
    <div class="dashboard-page-head">
      <div>
        <div class="dashboard-page-kicker">Live Classroom</div>
        <h1 class="dashboard-page-title">Streaming Session</h1>
        <p class="dashboard-page-copy">
          Attend the class in a focused full-width player with fewer visual
          distractions.
        </p>
      </div>
      <div class="dashboard-page-badges">
        <span class="dashboard-page-badge">Live session</span>
        <span class="dashboard-page-badge">Classroom view</span>
      </div>
    </div>

    <div class="dashboard-video-shell dashboard-player-shell">
      <div class="media-frame-16x9">
        <iframe
          src="https://www.youtube.com/embed/{{web_url}}"
          loading="lazy"
          allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
          allowfullscreen="true"
        ></iframe>
      </div>
    </div>
  </div>
</div>

{% endblock %}
