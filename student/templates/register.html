 {% extends "base.html" %}
         {% block content %}
 
 <div class="page_loader"></div>
       <a href="https://www.imagnus.in/"><img src="{{ app_url }}/static/credential_assets/img/back.png" class="back mt-20"></a>
 <!-- Login 14 start -->
 <div class="login-14">
     <div class="container">
         <div class="row login-box">
             <div class="col-lg-8 col-md-12 bg-img align-self-center">
                 <div class="info">
                     
                     <div class="btn-section clearfix">
                         <a href="/student/login/" class="link-btn active btn-1">Student Login </a>
                         <div class="clearfix"></div>
                         <a href="#" class="link-btn btn-1 default-bg">Register </a>
						 <div class="clearfix"></div>
                     </div>
                     
                 </div>
             </div>
             <div class="col-lg-4 col-md-12 bg-color-16 align-self-center">
                 <div class="form-section">
                     <h3>Create an account </h3>
                     <div class="login-inner-form">
                         <form action="/student/register/" method="POST">
                             <div class="form-group form-box">
                                 <input type="text" name="fullname" class="input-text" placeholder="Full Name" required/>
                                 <i class="flaticon-user"></i>
                             </div>
							  <div class="form-group form-box">
                                 <input type="tel" name="mobile" maxlength="10"class="input-text" placeholder="+91 | Phone Number" required />
                                 <i class="fa fa-phone"></i>
                             </div>
                             <div class="form-group form-box">
                                 <input type="email" name="email" class="input-text" placeholder="Email Address" required/>
                                 <i class="flaticon-mail-2"></i>
                             </div>
                             <input type="hidden" name="return_url" value="{{ returnURL }}" >
                             <div class="form-group form-box">
                                 <input type="password" name="password" class="input-text" placeholder="Password" required/>
                                 <i class="flaticon-password"></i>
                             </div>
                             <div class="checkbox clearfix">
                                 <div class="form-check checkbox-theme">
                                     <input class="form-check-input" type="checkbox" value="" id="rememberMe" required/>
                                     <label class="form-check-label" for="rememberMe">
                                        I agree to the  <a class="text-primary" href="https://www.imagnus.in/terms-conditions">terms of service </a>
                                     </label>
                                 </div>
                             </div>
                             <div class="form-group mb-0">
                                 <button type="submit" class="btn-md btn-theme btn-block">Register <i class="fa fa-arrow-circle-right float-right" aria-hidden="true" style="margin-top: 2px;"></i></button>
                             </div>
                             <p class="text">Already a member? <a href="/student/login/"> Login here </a></p>
                         </form>
                     </div>
                 </div>
             </div>
         </div>
     </div>
 </div>
 <!-- Login 14 end -->
 {% endblock %}
