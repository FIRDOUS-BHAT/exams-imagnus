      .login-14 { min-height: 100vh; display: flex !important; align-items: center !important; justify-content: center !important; padding: 40px 20px !important; }
      .login-14 .row.login-box, .login-14 .login-box { background: #1a1a24 !important; border: 1px solid rgba(255,255,255,.08) !important; border-radius: 20px !important; overflow: hidden !important; box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) !important; max-width: 1000px !important; width: 100% !important; min-height: 520px !important; }
      .login-14 .bg-img { border-radius: 20px 0 0 20px !important; overflow: hidden !important; }
      .login-14 .bg-color-16 { background: #13131d !important; padding: 48px 44px !important; display: flex !important; flex-direction: column !important; justify-content: center !important; }
      .login-14 .form-section, .login-14 .form-section h3, .login-14 .login-inner-form { text-align: left !important; }
      .login-14 .form-section::before { content: '✦ I-MAGNUS ACADEMY'; display: block; font-family: 'Space Grotesk', sans-serif; font-size: .65rem; font-weight: 700; letter-spacing: 2.5px; color: #a78bfa; background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.25); padding: 5px 12px; border-radius: 6px; width: fit-content; margin-bottom: 20px; }
      .login-14 .form-section h3 { font-family: 'Space Grotesk', sans-serif !important; font-weight: 700 !important; font-size: 1.6rem !important; color: #f1f5f9 !important; margin-bottom: 4px !important; }
      .login-14 .form-section h3::after { content: 'Enter your credentials to continue'; display: block; font-family: 'Inter', sans-serif; font-size: .82rem; font-weight: 400; color: #64748b; margin-top: 6px; }
      .login-14 .login-inner-form::before { content: ''; display: block; height: 1px; background: rgba(255,255,255,.07); margin: 22px 0; }
      .login-14 input[type="tel"], .login-14 input[type="password"], .login-14 input[type="text"], .login-14 input.input-text, .login-14 .form-box input { width: 100% !important; background: rgba(255,255,255,.04) !important; background-color: rgba(255,255,255,.04) !important; border: 1px solid rgba(255,255,255,.1) !important; color: #f1f5f9 !important; border-radius: 10px !important; padding: 13px 44px 13px 16px !important; font-family: 'Inter', sans-serif !important; font-size: .9rem !important; transition: all .25s ease !important; box-sizing: border-box !important; -webkit-appearance: none !important; }
      .login-14 input:focus, .login-14 .form-box input:focus { border-color: #7c3aed !important; box-shadow: 0 0 0 3px rgba(124,58,237,.15) !important; background: rgba(255,255,255,.06) !important; background-color: rgba(255,255,255,.06) !important; outline: none !important; color: #fff !important; }
      .login-14 input::placeholder { color: #475569 !important; }
      .login-14 input:-webkit-autofill, .login-14 input:-webkit-autofill:hover, .login-14 input:-webkit-autofill:focus { -webkit-text-fill-color: #f1f5f9 !important; -webkit-box-shadow: 0 0 0 1000px #1a1a2e inset !important; border: 1px solid rgba(255,255,255,.1) !important; transition: background-color 5000s ease-in-out 0s !important; }

  <body class="imagnus-auth-ui">
    {% block content %}{% endblock %}

    <!-- External JS libraries -->
    <script src="/static/credential_assets/js/jquery-2.2.0.min.js"></script>
    <script src="/static/credential_assets/js/popper.min.js"></script>
    <script src="/static/credential_assets/js/bootstrap.min.js"></script>
    <script src="/static/admin/js/js-snackbar.js"></script>

    <script type="text/javascript">
      //Near checkboxes

      $(".form-check-input").on("change", function () {
        $(".form-check-input").not(this).prop("checked", false);
      });
      $(document).on("click", "#pref_submit_btn", function () {
        pref_slug = $(".form-check-input:checked").val();
        if (pref_slug) {
          document.location.href = "/student/courses/" + pref_slug + "/";
        } else {
          alert("preference not selected! ");
        }
      });

      var mobile;
      function showSnackbar(message, status) {
        SnackBar({
          message: message,
          fixed: true,
          status: status,
          position: "tr", // bl, tl, tr, br
        });
      }

      function sendOtp(mobile) {
        var resp;
        var data = { mobile: mobile };
        fetch("send_otp.php", {
          method: "POST", // or 'PUT'
          body: JSON.stringify(data), // data can be `string` or {object}!
          headers: {
            "Content-Type": "application/json",
          },
        })
          .then((res) => res.json())
          .then((response) => resp)
          .catch((error) => console.error("Error:", error));

        return resp;
      }

      $("#send_otp").click(function () {
        mobile = $("#otp_mobile").val();
        if (mobile.length == 10) {
          var url = "/forgot_password_send_otp/";
          var data = { mobile: mobile };
          // var params = [];

          // for(i in data){
          //   params.push(i + "=" + encodeURIComponent(data[i]));
          // }

          fetch(url, {
            method: "POST", // or 'PUT'
            body: JSON.stringify(data), // data can be `string` or {object}!
            headers: {
              "Content-Type": "application/json",
            },
          })
            .then((res) => res.json())
            .then((response) => {
              if (response.status) {
                //  sendOtp(mobile)
                $("#otp_mobile").prop("disabled", true);
                $("#otp_mobile").addClass("auth-input-disabled");
                $("#otp_div").css("display", "block");
                $("#otp_div").css("visibility", "visible");
                showSnackbar(response.message, "success");

                //Timer for resend otp

                var sec = 15;
                var myTimer = document.getElementById("myTimer");
                var myBtn = document.getElementById("resend_otp_text");
                $("#send_otp").addClass("auth-otp-pending");
                myBtn.innerHTML = "Resend OTP";
                $(this).prop("disabled", true);
                countDown();
                function countDown() {
                  if (sec < 10) {
                    myTimer.innerHTML = "0" + sec;
                  } else {
                    myTimer.innerHTML = sec;
                  }
                  if (sec <= 0) {
                    // $("#myTimer").fadeTo(1500, 0);
                    $("#myTimer").text(" ");
                    $("#send_otp").prop("disabled", false);
                    $("#send_otp").removeClass("auth-otp-pending");
                    // $("#myBtn").removeClass().addClass("btnEnable");

                    return;
                  }
                  sec -= 1;
                  window.setTimeout(countDown, 1000);
                }
              } else {
                showSnackbar(response.message, "error");
              }
            })
            .catch((error) => console.error("Error:", error));
        }
      });

      $("#login_otp").keyup(function (e) {
        otp = $(this).val();

        if (otp.length == 6) {
          let mobile = $("#otp_mobile").val();
          var url = "/verify_otp/";
          var data = { otp: otp, mobile: mobile };
          // var params = [];

          // for(i in data){
          //   params.push(i + "=" + encodeURIComponent(data[i]));
          // }

          fetch(url, {
            method: "POST", // or 'PUT'
            body: JSON.stringify(data), // data can be `string` or {object}!
            headers: {
              "Content-Type": "application/json",
            },
          })
            .then((res) => res.json())
            .then((response) => {
              if (response.status) {
                //  sendOtp(mobile)
                $("#otp_mobile").prop("disabled", true);
                $("#otp_mobile").addClass("auth-input-disabled");
                $("#reset_password_token").val(response.token);
                showSnackbar(response.message, "success");
                $("#otp_form").css("display", "none");
                $("#otp_form").css("visibility", "hidden");
                $("#new_password_form").css("display", "block");
                $("#new_password_form").css("visibility", "visible");
              } else {
                showSnackbar(response.message, "error");
              }
            })
            .catch((error) => console.error("Error:", error));
        }
      });

      $(document).on("click", "#forgot_password", function (e) {
        $("#otp_form").trigger("reset");
        $("#otp_mobile").prop("disabled", false).removeClass("auth-input-disabled");
        $("#send_otp").prop("disabled", false).removeClass("auth-otp-pending");
        $("#myTimer").text("");
        $("#login_form").hide();
        $("#login_title").text("Forgot Password");
        $("#otp_form").css("display", "block");
        $("#otp_form").css("visibility", "visible");
      });

      $("#submit_password").click(function () {
        let password = $("#new_password").val();
        const reset_password_token = $("#reset_password_token").val();
        if (reset_password_token == "") {
          showSnackbar("Invalid Request.Try again.", "error");
          return;
        }
        if (password.length >= 6) {
          var url = "/update_password/";
          var data = { password: password };
          headers = {
            "Content-Type": "application/json",
            Authorization: "Bearer " + reset_password_token,
          };
          fetch(url, {
            method: "POST", // or 'PUT'
            headers: headers,
            body: JSON.stringify(data), // data can be `string` or {object}!
          })
            .then((res) => res.json())
            .then((response) => {
              if (response.status) {
                showSnackbar(response.message, "success");
                setTimeout(function () {
                  $("#login_mobile").val(mobile);
                  $("#login_password").val(password);
                  $("#login_form").submit();
                }, 2000);
              } else {
                showSnackbar(response.message, "error");
              }
            })
            .catch((error) => console.error("Error:", error));
        } else {
          showSnackbar("Password must be atleast of 6 characters", "error");
        }
      });
    </script>

    {% if message %}

    <script>
      // SnackBar({
      //           message: "{{message}}",
      //           fixed: true,
      //           status: "error",
      //           position: "tr" // bl, tl, tr, br
      //                      });
      showSnackbar("{{message}}", "error");
    </script>

    {% endif %}
    {% block scripts %}{% endblock %}
