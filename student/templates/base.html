    <script>
      (function () {
        var storageKey = "imagnus-theme";
        var legacyKey = "gmtNightMode";
        var theme = "light";
        try {
          var savedTheme = window.localStorage.getItem(storageKey);
          if (savedTheme === "light" || savedTheme === "dark") {
            theme = savedTheme;
          } else if (window.localStorage.getItem(legacyKey)) {
            theme = "dark";
          } else if (
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          ) {
            theme = "dark";
          }
        } catch (error) {}
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.style.colorScheme = theme;
        document.documentElement.classList.toggle("night-mode", theme === "dark");
      })();
    </script>

    <script type="text/javascript">
      //Near checkboxes

      $(".form-check-input").on("change", function () {
        $(".form-check-input").not(this).prop("checked", false);
      });
      $(document).on("click", "#pref_submit_btn", function () {
        pref_slug = $(".form-check-input:checked").val();
        if (pref_slug) {
          document.location.href = "/student/courses/" + pref_slug + "/";
        } else {
          alert("preference not selected! ");
        }
      });

      var mobile;
      function showSnackbar(message, status) {
        SnackBar({
          message: message,
          fixed: true,
          status: status,
          position: "tr", // bl, tl, tr, br
        });
      }

      function sendOtp(mobile) {
        var resp;
        var data = { mobile: mobile };
        fetch("send_otp.php", {
          method: "POST", // or 'PUT'
          body: JSON.stringify(data), // data can be `string` or {object}!
          headers: {
            "Content-Type": "application/json",
          },
        })
          .then((res) => res.json())
          .then((response) => resp)
          .catch((error) => console.error("Error:", error));

        return resp;
      }

      $("#send_otp").click(function () {
        mobile = $("#otp_mobile").val();
        if (mobile.length == 10) {
          var url = "/forgot_password_send_otp/";
          var data = { mobile: mobile };
          // var params = [];

          // for(i in data){
          //   params.push(i + "=" + encodeURIComponent(data[i]));
          // }

          fetch(url, {
            method: "POST", // or 'PUT'
            body: JSON.stringify(data), // data can be `string` or {object}!
            headers: {
              "Content-Type": "application/json",
            },
          })
            .then((res) => res.json())
            .then((response) => {
              if (response.status) {
                //  sendOtp(mobile)
                $("#otp_mobile").prop("disabled", true);
                $("#otp_mobile").addClass("auth-input-disabled");
                $("#otp_div").css("display", "block");
                $("#otp_div").css("visibility", "visible");
                $("#otp_div").attr("aria-hidden", "false");
                showSnackbar(response.message, "success");

                //Timer for resend otp

                var sec = 15;
                var myTimer = document.getElementById("myTimer");
                var myBtn = document.getElementById("resend_otp_text");
                $("#send_otp").addClass("auth-otp-pending");
                myBtn.innerHTML = "Resend OTP";
                $(this).prop("disabled", true);
                countDown();
                function countDown() {
                  if (sec < 10) {
                    myTimer.innerHTML = "0" + sec;
                  } else {
                    myTimer.innerHTML = sec;
                  }
                  if (sec <= 0) {
                    // $("#myTimer").fadeTo(1500, 0);
                    $("#myTimer").text(" ");
                    $("#send_otp").prop("disabled", false);
                    $("#send_otp").removeClass("auth-otp-pending");
                    // $("#myBtn").removeClass().addClass("btnEnable");

                    return;
                  }
                  sec -= 1;
                  window.setTimeout(countDown, 1000);
                }
              } else {
                showSnackbar(response.message, "error");
              }
            })
            .catch((error) => console.error("Error:", error));
        }
      });

      $("#login_otp").keyup(function (e) {
        otp = $(this).val();

        if (otp.length == 6) {
          let mobile = $("#otp_mobile").val();
          var url = "/verify_otp/";
          var data = { otp: otp, mobile: mobile };
          // var params = [];

          // for(i in data){
          //   params.push(i + "=" + encodeURIComponent(data[i]));
          // }

          fetch(url, {
            method: "POST", // or 'PUT'
            body: JSON.stringify(data), // data can be `string` or {object}!
            headers: {
              "Content-Type": "application/json",
            },
          })
            .then((res) => res.json())
            .then((response) => {
              if (response.status) {
                //  sendOtp(mobile)
                $("#otp_mobile").prop("disabled", true);
                $("#otp_mobile").addClass("auth-input-disabled");
                $("#reset_password_token").val(response.token);
                showSnackbar(response.message, "success");
                $("#otp_form").css("display", "none");
                $("#otp_form").css("visibility", "hidden");
                $("#otp_form").attr("aria-hidden", "true");
                $("#new_password_form").css("display", "block");
                $("#new_password_form").css("visibility", "visible");
                $("#new_password_form").attr("aria-hidden", "false");
              } else {
                showSnackbar(response.message, "error");
              }
            })
            .catch((error) => console.error("Error:", error));
        }
      });

      $(document).on("click", "#forgot_password", function (e) {
        $("#otp_form").trigger("reset");
        $("#otp_mobile").prop("disabled", false).removeClass("auth-input-disabled");
        $("#send_otp").prop("disabled", false).removeClass("auth-otp-pending");
        $("#myTimer").text("");
        $("#login_container").hide();
        $("#login_container").attr("aria-hidden", "true");
        $("#register_container").hide();
        $("#register_container").attr("aria-hidden", "true");
        $("#auth_title").text("Reset password");
        $("#auth_copy").text("Verify your registered mobile number and create a new password.");
        $("#otp_form").css("display", "block");
        $("#otp_form").css("visibility", "visible");
        $("#otp_form").attr("aria-hidden", "false");
        $("#new_password_form").attr("aria-hidden", "true");
      });

      $("#submit_password").click(function () {
        let password = $("#new_password").val();
        const reset_password_token = $("#reset_password_token").val();
        if (reset_password_token == "") {
          showSnackbar("Invalid Request.Try again.", "error");
          return;
        }
        if (password.length >= 6) {
          var url = "/update_password/";
          var data = { password: password };
          headers = {
            "Content-Type": "application/json",
            Authorization: "Bearer " + reset_password_token,
          };
          fetch(url, {
            method: "POST", // or 'PUT'
            headers: headers,
            body: JSON.stringify(data), // data can be `string` or {object}!
          })
            .then((res) => res.json())
            .then((response) => {
              if (response.status) {
                showSnackbar(response.message, "success");
                setTimeout(function () {
                  $("#login_mobile").val(mobile);
                  $("#login_password").val(password);
                  $("#login_form").submit();
                }, 2000);
              } else {
                showSnackbar(response.message, "error");
              }
            })
            .catch((error) => console.error("Error:", error));
        } else {
          showSnackbar("Password must be atleast of 6 characters", "error");
        }
      });
    </script>
