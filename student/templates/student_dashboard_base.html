    <script>
      (function () {
        var storageKey = "imagnus-theme";
        var legacyKey = "gmtNightMode";
        var theme = "light";
        try {
          var savedTheme = window.localStorage.getItem(storageKey);
          if (savedTheme === "light" || savedTheme === "dark") {
            theme = savedTheme;
          } else if (window.localStorage.getItem(legacyKey)) {
            theme = "dark";
          } else if (
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          ) {
            theme = "dark";
          }
        } catch (error) {}
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.style.colorScheme = theme;
        document.documentElement.classList.toggle("night-mode", theme === "dark");
      })();
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", (event) => {
        document.addEventListener(
          "contextmenu",
          function (e) {
            e.preventDefault();
          },
          false
        );
        document.onkeydown = function (e) {
          if (e.keyCode === 123) {
            // F12 key
            e.preventDefault();
          } else if (
            e.ctrlKey &&
            e.shiftKey &&
            (e.keyCode === 73 || e.keyCode === 74)
          ) {
            // Ctrl+Shift+I or Ctrl+Shift+J
            e.preventDefault();
          }
        };

        //  Disable F12 key, Ctrl+Shift+I/J/K, and Ctrl+U
        document.onkeydown = function (e) {
          if (
            e.keyCode === 123 || // F12
            (e.ctrlKey &&
              e.shiftKey &&
              (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 75)) || // Ctrl+Shift+I/J/K
            (e.ctrlKey && e.keyCode === 85)
          ) {
            // Ctrl+U
            e.preventDefault();
          }
        };
      });
    </script>
