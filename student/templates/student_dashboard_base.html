    <script>
      document.addEventListener("DOMContentLoaded", (event) => {
        document.addEventListener(
          "contextmenu",
          function (e) {
            e.preventDefault();
          },
          false
        );
        document.onkeydown = function (e) {
          if (e.keyCode === 123) {
            // F12 key
            e.preventDefault();
          } else if (
            e.ctrlKey &&
            e.shiftKey &&
            (e.keyCode === 73 || e.keyCode === 74)
          ) {
            // Ctrl+Shift+I or Ctrl+Shift+J
            e.preventDefault();
          }
        };

        //  Disable F12 key, Ctrl+Shift+I/J/K, and Ctrl+U
        document.onkeydown = function (e) {
          if (
            e.keyCode === 123 || // F12
            (e.ctrlKey &&
              e.shiftKey &&
              (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 75)) || // Ctrl+Shift+I/J/K
            (e.ctrlKey && e.keyCode === 85)
          ) {
            // Ctrl+U
            e.preventDefault();
          }
        };
      });
    </script>
